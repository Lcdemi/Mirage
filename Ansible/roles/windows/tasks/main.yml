---
- name: Validate mirage_action for Windows role
  assert:
    that:
      - (mirage_action | default('deploy')) in ['deploy', 'undeploy']
    fail_msg: "Invalid mirage_action='{{ mirage_action | default('deploy') }}'. Use 'deploy' or 'undeploy'."

- name: Run Windows {{ mirage_action | default('deploy') }} tasks
  include_tasks: "{{ mirage_action | default('deploy') }}.yml"